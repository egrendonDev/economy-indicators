name: Data Refresh

on:
  schedule:
    # Runs daily at 7am UTC
    # Each script internally checks if enough time has passed before running
    # html-scrape scripts also enforce a 1-hour cooldown to avoid hammering sites
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force refresh even if data is still fresh'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run api-pull-weekly (if due)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run api-pull:weekly -- --force
          else
            npm run api-pull:weekly
          fi

      - name: Run api-pull-monthly (if due)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run api-pull:monthly -- --force
          else
            npm run api-pull:monthly
          fi

      - name: Run api-pull-quarterly (if due)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run api-pull:quarterly -- --force
          else
            npm run api-pull:quarterly
          fi

      - name: Run api-pull-buy-signal (if due)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run api-pull:buy-signal -- --force
          else
            npm run api-pull:buy-signal
          fi

      - name: Run html-scrape-multpl-shared (1h cooldown enforced in script)
        # No FRED_API_KEY needed - scrapes public HTML pages only.
        # The script enforces a 1-hour cooldown internally and exits cleanly
        # if the cooldown has not been met (warns, does not fail the workflow).
        run: npm run html-scrape:multpl

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: data refresh [$(date -u '+%Y-%m-%d')]"
          git push
