name: Data Refresh

on:
  schedule:
    # Runs daily at 7am UTC
    # Each fetch script internally checks if enough time has passed before running
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force refresh even if data is still fresh'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run weekly fetch (if due)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run fetch:weekly -- --force
          else
            npm run fetch:weekly
          fi

      - name: Run monthly fetch (if due)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run fetch:monthly -- --force
          else
            npm run fetch:monthly
          fi

      - name: Run quarterly fetch (if due)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run fetch:quarterly -- --force
          else
            npm run fetch:quarterly
          fi

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: data refresh [$(date -u '+%Y-%m-%d')]"
          git push
